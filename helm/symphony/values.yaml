# Default values for symphony.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/agustif/symphony
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: symphony.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: symphony-tls
  #    hosts:
  #      - symphony.local

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Persistence configuration
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

# Configuration for Symphony
config:
  # Log level: trace, debug, info, warn, error
  logLevel: info
  
  # HTTP server configuration
  server:
    port: 8080
    bind: "0.0.0.0"
  
  # Workspace configuration
  workspace:
    root: /var/lib/symphony/workspaces
  
  # Logs configuration
  logs:
    root: /var/log/symphony
  
  # Workflow configuration (will be mounted as ConfigMap)
  workflow: |
    ---
    tracker:
      kind: linear
      project_slug: "your-project"
      active_states:
        - Todo
        - In Progress
      terminal_states:
        - Done
        - Closed
    polling:
      interval_ms: 30000
    workspace:
      root: /var/lib/symphony/workspaces
    agent:
      max_concurrent_agents: 5
      max_turns: 10
    codex:
      command: echo "Configure your codex command"
      approval_policy: never
    server:
      port: 8080
    ---
    
    Configure your workflow prompt here.

# Secrets configuration
secrets:
  # Linear API key (required)
  linearApiKey: ""
  # Existing secret name (if not using inline secrets)
  existingSecret: ""

# Monitoring configuration
monitoring:
  enabled: true
  serviceMonitor:
    enabled: false
    port: ""
    path: ""
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
  prometheusRule:
    enabled: false
    labels: {}
    rules: []

# Health checks
livenessProbe:
  httpGet:
    path: /api/v1/state
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /api/v1/state
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /api/v1/state
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

# Pod Disruption Budget
pdb:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Network Policy
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# Pod topology spread constraints
topologySpreadConstraints: []

# Extra volumes
extraVolumes: []
# - name: extra-config
#   configMap:
#     name: extra-config

# Extra volume mounts
extraVolumeMounts: []
# - name: extra-config
#   mountPath: /etc/symphony/extra

# Extra environment variables
extraEnvVars: []
# - name: CUSTOM_VAR
#   value: custom-value

# Extra containers
extraContainers: []

# Init containers
initContainers: []

# Sidecar containers
sidecars: []
