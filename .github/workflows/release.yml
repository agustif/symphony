name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build binaries for multiple platforms
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            binary: symphony-cli
            name: symphony-linux-amd64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            binary: symphony-cli
            name: symphony-linux-amd64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            binary: symphony-cli
            name: symphony-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            binary: symphony-cli
            name: symphony-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-14
            binary: symphony-cli
            name: symphony-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            binary: symphony-cli.exe
            name: symphony-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          key: ${{ matrix.target }}

      - name: Build binary
        working-directory: rust
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
          fi
          cargo build --release --target ${{ matrix.target }} --package symphony-cli --locked
        shell: bash

      - name: Package binary (Unix)
        if: matrix.os != 'windows-2022'
        working-directory: rust
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.name }}
          chmod +x dist/${{ matrix.name }}
          tar -czf dist/${{ matrix.name }}.tar.gz -C dist ${{ matrix.name }}

      - name: Package binary (Windows)
        if: matrix.os == 'windows-2022'
        working-directory: rust
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\${{ matrix.binary }} dist\${{ matrix.name }}
          cd dist
          7z a ${{ matrix.name }}.zip ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.name }}
          path: |
            rust/dist/*.tar.gz
            rust/dist/*.zip

  # Build multi-arch Docker images
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.rust
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # Generate SBOM and sign artifacts
  sign-and-attest:
    name: Sign and Attest
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: binaries-*

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: checksums
          path: artifacts/checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: artifacts/**/*

  # Create GitHub Release
  release:
    name: Create Release
    needs: [build-binaries, build-docker, sign-and-attest]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Download checksums
        uses: actions/download-artifact@v7
        with:
          name: checksums
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name || inputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name || inputs.version, '-') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/checksums.txt
          generate_release_notes: true
          body: |
            ## Symphony ${{ github.ref_name || inputs.version }}

            ### Binaries
            - Linux (AMD64, ARM64)
            - macOS (Intel, Apple Silicon)
            - Windows (AMD64)

            ### Docker Images
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name || inputs.version }}
            ```

            ### Installation
            Download the appropriate binary for your platform and make it executable:
            ```bash
            # Linux/macOS example
            tar -xzf symphony-linux-amd64.tar.gz
            chmod +x symphony-linux-amd64
            sudo mv symphony-linux-amd64 /usr/local/bin/symphony
            ```

            ### Checksums
            See `checksums.txt` for SHA256 hashes of all artifacts.

  # Update Homebrew tap (if applicable)
  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    steps:
      - name: Trigger Homebrew update
        uses: peter-evans/repository-dispatch@v3
        with:
          repository: ${{ github.repository_owner }}/homebrew-symphony
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "sha256_linux": "${{ needs.build-binaries.outputs.linux_sha }}",
              "sha256_macos": "${{ needs.build-binaries.outputs.macos_sha }}"
            }
        continue-on-error: true
