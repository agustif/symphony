name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare-release:
    name: Prepare Release Metadata
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      version_number: ${{ steps.resolve.outputs.version_number }}
      major_minor: ${{ steps.resolve.outputs.major_minor }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      publish_latest: ${{ steps.resolve.outputs.publish_latest }}
    steps:
      - name: Resolve release version
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must match v<major>.<minor>.<patch>[-prerelease]. Got: $version" >&2
            exit 1
          fi

          version_number="${version#v}"
          major_minor="$(printf '%s' "$version_number" | awk -F. '{print $1 "." $2}')"

          if [[ "$version_number" == *-* ]]; then
            prerelease=true
            publish_latest=false
          else
            prerelease=false
            publish_latest=true
          fi

          {
            echo "version=$version"
            echo "version_number=$version_number"
            echo "major_minor=$major_minor"
            echo "prerelease=$prerelease"
            echo "publish_latest=$publish_latest"
          } >> "$GITHUB_OUTPUT"

  # Build binaries for multiple platforms
  build-binaries:
    name: Build ${{ matrix.target }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            binary: symphony-cli
            name: symphony-linux-amd64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            binary: symphony-cli
            name: symphony-linux-amd64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            binary: symphony-cli
            name: symphony-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            binary: symphony-cli
            name: symphony-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-14
            binary: symphony-cli
            name: symphony-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            binary: symphony-cli.exe
            name: symphony-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.os == 'ubuntu-24.04' && (matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'x86_64-unknown-linux-musl')
        run: |
          sudo apt-get update
          packages=()
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            packages+=(gcc-aarch64-linux-gnu)
          fi
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            packages+=(musl-tools)
          fi
          sudo apt-get install -y "${packages[@]}"

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          key: ${{ matrix.target }}

      - name: Build binary
        working-directory: rust
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
          fi
          cargo build --release --target ${{ matrix.target }} --package symphony-cli --locked
        shell: bash

      - name: Package binary (Unix)
        if: matrix.os != 'windows-2022'
        working-directory: rust
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.name }}
          chmod +x dist/${{ matrix.name }}
          tar -czf dist/${{ matrix.name }}.tar.gz -C dist ${{ matrix.name }}

      - name: Package binary (Windows)
        if: matrix.os == 'windows-2022'
        working-directory: rust
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.name }}"
          Set-Location dist
          7z a "${{ matrix.name }}.zip" "${{ matrix.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.name }}
          path: |
            rust/dist/*.tar.gz
            rust/dist/*.zip

  # Build multi-arch Docker images
  build-docker:
    name: Build Docker Images
    needs: prepare-release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare-release.outputs.version }}
            type=raw,value=${{ needs.prepare-release.outputs.version_number }}
            type=raw,value=${{ needs.prepare-release.outputs.major_minor }},enable=${{ needs.prepare-release.outputs.publish_latest == 'true' }}
            type=raw,value=latest,enable=${{ needs.prepare-release.outputs.publish_latest == 'true' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.rust
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # Generate SBOM and sign artifacts
  sign-and-attest:
    name: Sign and Attest
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-24.04
    outputs:
      linux_sha: ${{ steps.collect.outputs.linux_sha }}
      darwin_amd64_sha: ${{ steps.collect.outputs.darwin_amd64_sha }}
      darwin_arm64_sha: ${{ steps.collect.outputs.darwin_arm64_sha }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Collect release checksums
        id: collect
        working-directory: artifacts
        run: |
          checksum_for() {
            awk -v name="$1" 'index($2, name) { print $1; exit }' checksums.txt
          }

          linux_sha="$(checksum_for "symphony-linux-amd64-musl.tar.gz")"
          darwin_amd64_sha="$(checksum_for "symphony-darwin-amd64.tar.gz")"
          darwin_arm64_sha="$(checksum_for "symphony-darwin-arm64.tar.gz")"

          for value_name in linux_sha darwin_amd64_sha darwin_arm64_sha; do
            if [ -z "${!value_name}" ]; then
              echo "Missing checksum for ${value_name}" >&2
              exit 1
            fi
          done

          {
            echo "linux_sha=$linux_sha"
            echo "darwin_amd64_sha=$darwin_amd64_sha"
            echo "darwin_arm64_sha=$darwin_arm64_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: checksums
          path: artifacts/checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: artifacts/**/*

  # Create GitHub Release
  release:
    name: Create Release
    needs: [prepare-release, build-binaries, build-docker, sign-and-attest]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Download checksums
        uses: actions/download-artifact@v7
        with:
          name: checksums
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ needs.prepare-release.outputs.version }}
          draft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease == 'true' }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/checksums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## Symphony ${{ needs.prepare-release.outputs.version }}

            ### Binaries
            - Linux (AMD64, ARM64)
            - macOS (Intel, Apple Silicon)
            - Windows (AMD64)

            ### Docker Images
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.prepare-release.outputs.version }}
            ```

            ### Installation
            Download the appropriate binary for your platform and make it executable:
            ```bash
            # Linux/macOS example
            tar -xzf symphony-linux-amd64.tar.gz
            chmod +x symphony-linux-amd64
            sudo mv symphony-linux-amd64 /usr/local/bin/symphony
            ```

            ### Checksums
            See `checksums.txt` for SHA256 hashes of all artifacts.

  # Update Homebrew tap (if applicable)
  homebrew:
    name: Update Homebrew Tap
    needs: [prepare-release, sign-and-attest, release]
    runs-on: ubuntu-24.04
    if: needs.prepare-release.outputs.publish_latest == 'true'
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Skip when Homebrew token is not configured
        if: env.HOMEBREW_TAP_TOKEN == ''
        run: echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap dispatch."

      - name: Trigger Homebrew update
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: ${{ github.repository_owner }}/homebrew-symphony
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ needs.prepare-release.outputs.version }}",
              "tag": "${{ needs.prepare-release.outputs.version }}",
              "sha256_linux": "${{ needs.sign-and-attest.outputs.linux_sha }}",
              "sha256_linux_amd64_musl": "${{ needs.sign-and-attest.outputs.linux_sha }}",
              "sha256_darwin_amd64": "${{ needs.sign-and-attest.outputs.darwin_amd64_sha }}",
              "sha256_darwin_arm64": "${{ needs.sign-and-attest.outputs.darwin_arm64_sha }}"
            }
