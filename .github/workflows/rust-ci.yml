name: rust-ci

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
  push:
    branches:
      - main
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
  workflow_dispatch:

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    name: cargo-fmt
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nightly with rustfmt
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: cargo-clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nightly with clippy
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Run clippy with warnings denied
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: cargo-test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Run workspace tests
        run: cargo test --workspace --all-features --locked
