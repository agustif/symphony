name: rust-ci

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
  push:
    branches:
      - main
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
  workflow_dispatch:

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    name: cargo-fmt
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nightly with rustfmt
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: cargo-clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nightly with clippy
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Run clippy with warnings denied
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: cargo-test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Run workspace tests
        run: cargo test --workspace --all-features --locked

  coverage:
    name: cargo-coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nightly with llvm-tools
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2.68.20
        with:
          tool: cargo-llvm-cov

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Generate coverage reports
        run: |
          mkdir -p coverage
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --all-features --locked --no-report
          cargo llvm-cov report --summary-only | tee coverage/summary.txt
          cargo llvm-cov report --lcov --output-path coverage/lcov.info

      - name: Publish coverage summary
        run: |
          {
            echo "## Rust coverage"
            echo
            cat coverage/summary.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          path: |
            rust/coverage/summary.txt
            rust/coverage/lcov.info

  suite-gates:
    name: suite-${{ matrix.suite }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust
    strategy:
      fail-fast: false
      matrix:
        suite:
          - conformance
          - interleavings
          - soak

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Run suite gate
        run: |
          case "${{ matrix.suite }}" in
            conformance)
              cargo test --package symphony-testkit --test conformance_suite --all-features --locked
              ;;
            interleavings)
              cargo test --package symphony-testkit --test interleavings_suite --all-features --locked
              ;;
            soak)
              cargo test --package symphony-testkit --test soak_suite --all-features --locked
              ;;
            *)
              echo "unknown suite: ${{ matrix.suite }}" >&2
              exit 2
              ;;
          esac
